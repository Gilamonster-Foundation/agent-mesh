name: Release

# This workflow runs on every `v*` tag push and does:
#   1. Build wheels for linux + macOS (windows dropped pending iroh debug)
#   2. Build sdist
#   3. Publish wheels to PyPI via trusted publishing
#   4. Publish Rust crates to crates.io (in dep order) IF
#      CARGO_REGISTRY_TOKEN is set as a repo secret
#
# Auth:
#   - PyPI uses trusted publishing (OIDC); configured on PyPI side
#   - crates.io needs an API token saved as `CARGO_REGISTRY_TOKEN` secret
#
# HOOK PARITY: This workflow does NOT run on every PR / push to main —
# unlike ci.yml, it's gated on tag events. The pre-push hook in
# .githooks/pre-push covers the lint/test/coverage bar; wheel building
# is verified locally with `maturin build --release`.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-wheels:
    name: Build wheel (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Windows is intentionally OUT for v0.5 — maturin fails linking
        # against iroh-net's QUIC stack on windows-latest. Add it back
        # when a wheel actually builds; needs quinn/iroh Windows debug.
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          # The pyproject.toml at the repo root drives maturin; the
          # underlying Cargo project is agent-mesh-py.
          command: build
          args: --release --strip --interpreter "3.9 3.10 3.11 3.12"
          # On Linux, build a manylinux wheel via the official auditwheel
          # container. macOS/Windows builds run native.
          manylinux: ${{ matrix.os == 'ubuntu-latest' && 'auto' || 'off' }}

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: target/wheels/*.whl
          if-no-files-found: error
          retention-days: 14

  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: target/wheels/*.tar.gz
          if-no-files-found: error
          retention-days: 14

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build-wheels, build-sdist]
    # Only publish on tag pushes — workflow_dispatch (manual) builds
    # the artifacts but doesn't upload.
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/agent-mesh
    permissions:
      id-token: write
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          path: dist-merged
      - name: Flatten wheel layout
        run: |
          set -eux
          mkdir -p dist
          find dist-merged -type f \( -name '*.whl' -o -name '*.tar.gz' \) -exec cp {} dist/ \;
          ls -lh dist/
      - name: Publish to PyPI
        # Uses trusted publishing (no API token needed if `pypi`
        # environment is wired). Falls back to PYPI_API_TOKEN if
        # provided as a repo secret.
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true

  publish-cratesio:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    # Only run if the rest of the release succeeded; we don't want to
    # publish Rust crates if the wheels failed to build.
    needs: [build-wheels, build-sdist]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish crates in dep order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euxo pipefail
          if [ -z "${CARGO_REGISTRY_TOKEN:-}" ]; then
            echo "CARGO_REGISTRY_TOKEN not set; skipping crates.io publish"
            echo "(PyPI wheels and sdist still uploaded by publish-pypi job)"
            exit 0
          fi
          # Publish in dependency order. agent-mesh-protocol is the root;
          # each subsequent crate depends on its predecessors. After each
          # publish, wait for the crates.io index to update — cargo
          # sometimes can't see the new version on the very next publish
          # in the chain.
          for crate in \
              agent-mesh-protocol \
              agent-mesh-discovery \
              agent-mesh-transport \
              agent-mesh-bus \
              agent-mesh-cli; do
            echo "::group::publishing $crate"
            cargo publish -p "$crate" --token "$CARGO_REGISTRY_TOKEN" || {
              echo "Publish of $crate failed; aborting chain"
              exit 1
            }
            echo "waiting 20s for crates.io index propagation"
            sleep 20
            echo "::endgroup::"
          done
